name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  ARTIFACT_REPOSITORY: offer-scout-ai

jobs:
  test-agent:
    name: Test scout-agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scout-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --console=plain

  test-coordinator:
    name: Test scout-coordinator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scout-coordinator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest --cov=scout_coordinator --cov-report=term-missing

      - name: Compile Python
        run: python -m compileall src tests

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs:
      - test-agent
      - test-coordinator
    steps:
      - uses: actions/checkout@v4

      - name: Build scout-agent
        run: docker build -t scout-agent:${{ github.sha }} ./scout-agent

      - name: Build scout-coordinator
        run: docker build -t scout-coordinator:${{ github.sha }} ./scout-coordinator

  terraform-check:
    name: Terraform check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra

      - name: Validate bootstrap
        run: |
          terraform -chdir=infra/bootstrap init -backend=false
          terraform -chdir=infra/bootstrap validate

      - name: Validate main
        run: |
          terraform -chdir=infra/main init -backend=false
          terraform -chdir=infra/main validate

  deploy:
    name: Deploy app images
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - terraform-check
    if: >
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      ) &&
      github.ref == 'refs/heads/main' &&
      vars.GCP_PROJECT_ID != '' &&
      vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
      vars.GCP_SERVICE_ACCOUNT != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push images
        env:
          IMAGE_PREFIX: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}
        run: |
          docker build -t "${IMAGE_PREFIX}/scout-agent:${{ github.sha }}" ./scout-agent
          docker build -t "${IMAGE_PREFIX}/scout-coordinator:${{ github.sha }}" ./scout-coordinator
          docker push "${IMAGE_PREFIX}/scout-agent:${{ github.sha }}"
          docker push "${IMAGE_PREFIX}/scout-coordinator:${{ github.sha }}"

      - name: Update Cloud Run services if they exist
        env:
          IMAGE_PREFIX: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}
        run: |
          if gcloud run services describe scout-agent --region="${GCP_REGION}" --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            gcloud run services update scout-agent \
              --image="${IMAGE_PREFIX}/scout-agent:${{ github.sha }}" \
              --region="${GCP_REGION}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --quiet
          else
            echo "scout-agent does not exist yet. Run infra/main Terraform manually after this image is pushed."
          fi

          if gcloud run services describe scout-coordinator --region="${GCP_REGION}" --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            gcloud run services update scout-coordinator \
              --image="${IMAGE_PREFIX}/scout-coordinator:${{ github.sha }}" \
              --region="${GCP_REGION}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --quiet
          else
            echo "scout-coordinator does not exist yet. Run infra/main Terraform manually after this image is pushed."
          fi
